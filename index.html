<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — KosBites</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --green: #22C55E;
      --green-dark: #16A34A;
      --green-light: #DCFCE7;
      --green-pale: #F0FDF4;
      --yellow: #F8C536;
      --yellow-light: #FEF9C3;
      --yellow-dark: #D97706;
      --text: #1A2E1A;
      --muted: #6B7F6B;
      --border: #E2F0E2;
      --off: #F7FDF7;
      --radius: 16px;
      --radius-sm: 10px;
      --t: 0.28s cubic-bezier(0.4, 0, 0.2, 1)
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--off);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased
    }

    /* NAV */
    nav {
      background: rgba(247, 253, 247, .9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--green);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      color: var(--text)
    }

    .logo-text span {
      color: var(--green)
    }

    .nav-back {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color var(--t)
    }

    .nav-back:hover {
      color: var(--green-dark)
    }

    /* MAIN WRAPPER */
    .wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem
    }

    /* CARD */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(34, 197, 94, .08);
      animation: fadeUp .5s ease both
    }

    @keyframes fadeUp {
      from {
        transform: translateY(24px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1.75rem
    }

    .card-logo-icon {
      width: 44px;
      height: 44px;
      background: var(--green);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px
    }

    .card-logo-text {
      font-size: 22px;
      font-weight: 800;
      color: var(--text)
    }

    .card-logo-text span {
      color: var(--green)
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: .4rem
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem
    }

    /* ROLE TABS */
    .role-tabs {
      display: flex;
      background: var(--off);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 4px
    }

    .role-tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      border-radius: 7px;
      cursor: pointer;
      transition: all .2s;
      user-select: none
    }

    .role-tab.active {
      background: #fff;
      color: var(--green-dark);
      box-shadow: 0 1px 6px rgba(34, 197, 94, .12)
    }

    /* FORM */
    .form-group {
      margin-bottom: 1rem
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .4rem;
      display: block
    }

    .input-wrap {
      position: relative
    }

    .form-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fff
    }

    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .1)
    }

    .form-input.has-icon {
      padding-left: 40px
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--muted)
    }

    .input-toggle {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0
    }

    .forgot {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px
    }

    .forgot a {
      font-size: 12px;
      font-weight: 600;
      color: var(--green-dark);
      text-decoration: none
    }

    .forgot a:hover {
      text-decoration: underline
    }

    /* ERROR MSG */
    .error-msg {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: #DC2626;
      margin-bottom: 1rem;
      align-items: center;
      gap: 8px
    }

    .error-msg.show {
      display: flex
    }

    /* BUTTONS */
    .btn-login {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background .2s, transform .15s;
      margin-top: .5rem
    }

    .btn-login:hover {
      background: var(--green-dark);
      transform: translateY(-1px)
    }

    .btn-login:active {
      transform: translateY(0)
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.5rem 0
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .divider-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap
    }

    .demo-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: .75rem
    }

    .demo-btns {
      display: flex;
      gap: 10px
    }

    .btn-demo {
      flex: 1;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      transition: all .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px
    }

    .btn-demo:hover {
      border-color: var(--green);
      background: var(--green-pale);
      color: var(--green-dark)
    }

    .btn-demo span {
      font-size: 20px
    }

    .btn-demo small {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500
    }

    .register-row {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--muted)
    }

    .register-row a {
      color: var(--green-dark);
      font-weight: 700;
      text-decoration: none
    }

    .register-row a:hover {
      text-decoration: underline
    }

    /* LOADING OVERLAY */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(247, 253, 247, .85);
      backdrop-filter: blur(6px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px
    }

    .loading-overlay.show {
      display: flex
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--green-light);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--green-dark)
    }

    /* FOOTER */
    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 11px;
      color: var(--muted)
    }

    @media(max-width:480px) {
      .card {
        padding: 2rem 1.25rem
      }

      .demo-btns {
        flex-direction: column
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="index.html">
      <div class="logo-icon">🍱</div>
      <div class="logo-text">Kos<span>Bites</span></div>
    </a>
    <a class="nav-back" href="index.html">← Kembali ke Beranda</a>
  </nav>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Sedang masuk...</div>
  </div>

  <!-- MAIN -->
  <div class="wrapper">
    <div class="card">

      <!-- LOGO -->
      <div class="card-logo">
        <div class="card-logo-icon">🍱</div>
        <div class="card-logo-text">Kos<span>Bites</span></div>
      </div>

      <div class="card-title">Selamat Datang!</div>
      <div class="card-sub">Masuk untuk melanjutkan pesananmu</div>

      <!-- ROLE TABS -->
      <div class="role-tabs">
        <div class="role-tab active" id="tabUser" onclick="setRole('user')">👤 User</div>
        <div class="role-tab" id="tabAdmin" onclick="setRole('admin')">⚙️ Admin</div>
      </div>

      <!-- ERROR -->
      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorText">Email atau password salah.</span>
      </div>

      <!-- FORM -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input class="form-input has-icon" type="email" id="emailInput" placeholder="email@kamu.com"
            autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="form-input has-icon" type="password" id="passInput" placeholder="Masukkan password"
            autocomplete="current-password">
          <button class="input-toggle" onclick="togglePass()" id="toggleBtn" type="button">👁</button>
        </div>
        <div class="forgot"><a href="#">Lupa password?</a></div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="handleLogin()">Masuk →</button>

      <!-- DIVIDER -->
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">atau coba sebagai</div>
        <div class="divider-line"></div>
      </div>

      <!-- DEMO BUTTONS -->
      <div class="demo-section">
        <div class="demo-label">Akses Demo Langsung</div>
        <div class="demo-btns">
          <button class="btn-demo" onclick="demoLogin('user')">
            <span>👤</span>
            Masuk sebagai User
            <small>Lihat halaman publik</small>
          </button>
          <button class="btn-demo" onclick="demoLogin('admin')">
            <span>⚙️</span>
            Masuk sebagai Admin
            <small>Buka dashboard admin</small>
          </button>
        </div>
      </div>

      <div class="register-row">
        Belum punya akun? <a href="#">Daftar sekarang</a>
      </div>

    </div>
  </div>

  <footer>© 2025 KosBites · Makan enak tanpa ribet.</footer>

  <script>
    // Demo credentials
    const DEMO_ACCOUNTS = {
      user: { email: 'user@kosbites.id', pass: 'user123' },
      admin: { email: 'admin@kosbites.id', pass: 'admin123' }
    }

    let currentRole = 'user'
    let showPass = false

    function setRole(role) {
      currentRole = role
      document.getElementById('tabUser').classList.toggle('active', role === 'user')
      document.getElementById('tabAdmin').classList.toggle('active', role === 'admin')
      document.getElementById('errorMsg').classList.remove('show')
      document.getElementById('emailInput').value = ''
      document.getElementById('passInput').value = ''
    }

    function togglePass() {
      showPass = !showPass
      const input = document.getElementById('passInput')
      input.type = showPass ? 'text' : 'password'
      document.getElementById('toggleBtn').textContent = showPass ? '🙈' : '👁'
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      document.getElementById('errorText').textContent = msg
      el.classList.add('show')
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('show')
    }

    function showLoading(text) {
      document.getElementById('loadingText').textContent = text
      document.getElementById('loadingOverlay').classList.add('show')
    }

    // Tentukan tujuan redirect berdasarkan role
    function getDestination(role) {
      return role === 'admin' ? 'dashboard.html' : 'arsip-artikel.html'
    }

    function handleLogin() {
      hideError()
      const email = document.getElementById('emailInput').value.trim()
      const pass = document.getElementById('passInput').value.trim()

      if (!email) { showError('Email tidak boleh kosong.'); return }
      if (!email.includes('@')) { showError('Format email tidak valid.'); return }
      if (!pass) { showError('Password tidak boleh kosong.'); return }
      if (pass.length < 6) { showError('Password minimal 6 karakter.'); return }

      const acc = DEMO_ACCOUNTS[currentRole]
      if (email !== acc.email || pass !== acc.pass) {
        showError('Email atau password salah. Coba gunakan akun demo di bawah.')
        return
      }

      const dest = getDestination(currentRole)
      const label = currentRole === 'admin' ? 'Masuk ke Dashboard Admin...' : 'Masuk ke KosBites...'
      showLoading(label)
      setTimeout(() => { window.location.href = dest }, 1500)
    }

    function demoLogin(role) {
      hideError()
      const dest = getDestination(role)
      const label = role === 'admin' ? 'Membuka Dashboard Admin...' : 'Masuk sebagai User...'
      showLoading(label)
      setTimeout(() => { window.location.href = dest }, 1200)
    }

    // Enter key support
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin()
    })

    // Auto-fill hint on tab switch
    document.getElementById('tabAdmin').addEventListener('click', function () {
      document.getElementById('emailInput').placeholder = 'admin@kosbites.id'
      document.getElementById('passInput').placeholder = 'admin123'
    })
    document.getElementById('tabUser').addEventListener('click', function () {
      document.getElementById('emailInput').placeholder = 'user@kosbites.id'
      document.getElementById('passInput').placeholder = 'user123'
    })
  </script>

</body>

</html>
